<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a2a66"/>
      <stop offset="1" stop-color="#04163a"/>
    </linearGradient>
    <linearGradient id="ceiling" x1="800" y1="0" x2="800" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f4fa8"/>
      <stop offset="1" stop-color="#0a2a66"/>
    </linearGradient>
    <linearGradient id="floor" x1="800" y1="500" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a2f70"/>
      <stop offset="1" stop-color="#03122f"/>
    </linearGradient>
    <radialGradient id="vanishGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 430) rotate(90) scale(260 360)">
      <stop stop-color="#7ae7ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#7ae7ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.8"/>
    </filter>
    <filter id="blur6" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="#04112d"/>

  <polygon points="0,0 1600,0 1120,520 480,520" fill="url(#ceiling)"/>
  <polygon points="480,520 1120,520 1600,1000 0,1000" fill="url(#floor)"/>

  <polygon points="0,0 480,520 0,1000" fill="url(#wall)"/>
  <polygon points="1600,0 1120,520 1600,1000" fill="url(#wall)"/>

  <rect x="590" y="0" width="420" height="58" fill="#bff7ff" opacity="0.9"/>
  <rect x="590" y="66" width="420" height="58" fill="#bff7ff" opacity="0.88"/>
  <rect x="590" y="132" width="420" height="58" fill="#bff7ff" opacity="0.84"/>
  <rect x="590" y="198" width="420" height="58" fill="#bff7ff" opacity="0.8"/>
  <rect x="590" y="264" width="420" height="58" fill="#bff7ff" opacity="0.75"/>
  <rect x="590" y="330" width="420" height="58" fill="#bff7ff" opacity="0.68"/>

  <g opacity="0.3" filter="url(#blur3)">
    <rect x="585" y="0" width="430" height="390" fill="#9defff"/>
  </g>

  <g opacity="0.9" stroke="#2f7fe3" stroke-width="2">
    <line x1="0" y1="120" x2="480" y2="520"/>
    <line x1="0" y1="240" x2="480" y2="520"/>
    <line x1="0" y1="360" x2="480" y2="520"/>
    <line x1="0" y1="480" x2="480" y2="520"/>

    <line x1="1600" y1="120" x2="1120" y2="520"/>
    <line x1="1600" y1="240" x2="1120" y2="520"/>
    <line x1="1600" y1="360" x2="1120" y2="520"/>
    <line x1="1600" y1="480" x2="1120" y2="520"/>
  </g>

  <g opacity="0.8" stroke="#4aa8ff" stroke-width="3">
    <line x1="490" y1="560" x2="260" y2="1000"/>
    <line x1="560" y1="560" x2="420" y2="1000"/>
    <line x1="640" y1="560" x2="600" y2="1000"/>
    <line x1="960" y1="560" x2="1000" y2="1000"/>
    <line x1="1040" y1="560" x2="1180" y2="1000"/>
    <line x1="1110" y1="560" x2="1340" y2="1000"/>
  </g>

  <g opacity="0.55" stroke="#78d5ff" stroke-width="4" filter="url(#blur3)">
    <line x1="730" y1="560" x2="700" y2="1000"/>
    <line x1="800" y1="560" x2="800" y2="1000"/>
    <line x1="870" y1="560" x2="900" y2="1000"/>
  </g>

  <g opacity="0.75" fill="#8de7ff" filter="url(#blur6)">
    <circle cx="800" cy="430" r="55"/>
  </g>
  <rect width="1600" height="1000" fill="url(#vanishGlow)"/>

  <g opacity="0.35">
    <rect x="24" y="594" width="120" height="8" rx="4" fill="#79d7ff"/>
    <rect x="1456" y="594" width="120" height="8" rx="4" fill="#79d7ff"/>
    <rect x="40" y="680" width="100" height="8" rx="4" fill="#79d7ff"/>
    <rect x="1460" y="680" width="100" height="8" rx="4" fill="#79d7ff"/>
    <rect x="60" y="770" width="90" height="8" rx="4" fill="#79d7ff"/>
    <rect x="1450" y="770" width="90" height="8" rx="4" fill="#79d7ff"/>
  </g>
</svg>
