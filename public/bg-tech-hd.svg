<svg width="2400" height="1400" viewBox="0 0 2400 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="base" x1="1200" y1="0" x2="1200" y2="1400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06173A"/>
      <stop offset="1" stop-color="#020A1A"/>
    </linearGradient>
    <linearGradient id="ceiling" x1="1200" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A3D90"/>
      <stop offset="1" stop-color="#092A62"/>
