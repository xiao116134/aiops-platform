    <radialGradient id="focusGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1200 660) rotate(90) scale(300 420)">
      <stop stop-color="#9CF4FF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#9CF4FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
