services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: aiops-frontend
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aiops-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiops-backend
    environment:
      APP_NAME: ${APP_NAME:-AiOps API}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5174,http://127.0.0.1:5174}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-120}
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiops}:${POSTGRES_PASSWORD:-aiops_change_me}@postgres:5432/${POSTGRES_DB:-aiops}
    volumes:
      - aiops_uploads:/app/uploads
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - aiops-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16.4
    container_name: aiops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiops}
      POSTGRES_USER: ${POSTGRES_USER:-aiops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiops_change_me}
    volumes:
      - aiops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiops} -d ${POSTGRES_DB:-aiops}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - aiops-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.4.1-alpine
    container_name: aiops-redis
    command: ["redis-server", "--appendonly", "${REDIS_APPENDONLY:-yes}"]
    volumes:
      - aiops_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - aiops-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  aiops-net:
    driver: bridge

volumes:
  aiops_uploads:
  aiops_db:
  aiops_postgres:
  aiops_redis:
